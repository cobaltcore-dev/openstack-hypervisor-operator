# Configuration file for <https://github.com/sapcc/go-makefile-maker>

binaries:
  - name:        manager
    fromPackage: ./cmd
    installTo:   bin/

controllerGen:
  enabled: true
  crdOutputPath: charts/openstack-hypervisor-operator/crds
  objectHeaderFile: hack/boilerplate.go.txt
  rbacRoleName: hypervisor-operator-manager-role
  rbacOutputPath: charts/openstack-hypervisor-operator/templates
  allowDangerousTypes: true

coverageTest:
  only: '/internal'

dockerfile:
  enabled: true
  runAsRoot: false

golang:
  autoupdateDependencies:
    enabled: true
    matchModule: ^github.com/(?:sapcc|sap-cloud-infrastructure|cobaltcore-dev)/
  setGoModVersion: true

golangciLint:
  createConfig: true

githubWorkflow:
  ci:
    enabled: true
    runOn: [large_runner_16core_64gb]
  global:
    defaultBranch: main # only defined here so that the "Run go-makefile-maker" Action knows it
  securityChecks:
    enabled: true
    queries: security-extended
  pushContainerToGhcr:
    enabled: true
    platforms: "linux/amd64,linux/arm64"
    tagStrategy:
      - latest
      - semver
      - sha
  pushHelmChartToGhcr:
    path: charts/openstack-hypervisor-operator
  license:
    enabled: true

metadata:
  url: https://github.com/cobaltcore-dev/openstack-hypervisor-operator

renovate:
  enabled: true
  assignees:
    - notandy
    - fwiesel
    - mchristianl
    - toanju

reuse:
  annotations:
    - paths:
        - PROJECT
        - config/**
        - charts/**
        - build/**
        - applyconfigurations/**
      SPDX-FileCopyrightText: 'SAP SE or an SAP affiliate company and cobaltcore-dev contributors'
      SPDX-License-Identifier: Apache-2.0

verbatim: |
  .PHONY: install-crds
  install-crds: generate ## Install CRDs into the K8s cluster specified in ~/.kube/config.
      kubectl apply -f "charts/openstack-hypervisor-operator/crds/*.yaml"
