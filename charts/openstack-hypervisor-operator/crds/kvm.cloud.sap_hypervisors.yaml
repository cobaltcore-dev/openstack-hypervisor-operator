---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: hypervisors.kvm.cloud.sap
spec:
  group: kvm.cloud.sap
  names:
    kind: Hypervisor
    listKind: HypervisorList
    plural: hypervisors
    shortNames:
    - hv
    singular: hypervisor
  scope: Cluster
  versions:
  - additionalPrinterColumns:
