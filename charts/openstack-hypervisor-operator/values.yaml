controllerManager:
  manager:
    args:
    - --metrics-bind-address=:8443
    - --leader-elect
    - --health-probe-bind-address=:8081
    - --certificate-namespace=$(CERTIFICATE_NAMESPACE)
    - --certificate-issuer-name=$(CERTIFICATE_ISSUER_NAME)
    - --label-selector=$(LABEL_SELECTOR)
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    env:
      certificateIssuerName: nova-hypervisor-agents-ca-issuer
      certificateNamespace: monsoon3
      labelSelector: ""
      osAuthUrl: ""
      osProjectDomainName: ""
      osProjectName: ""
      osRegionName: ""
      osUserDomainName: ""
      osUsername: ""
    image:
      repository: ghcr.io/cobaltcore-dev/openstack-hypervisor-operator
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  nodeSelector: {}
  podSecurityContext:
    runAsNonRoot: true
  replicas: 1
  tolerations: []
  topologySpreadConstraints: []
kubernetesClusterDomain: cluster.local
metricsService:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  type: ClusterIP
serviceMonitor:
  create: true
  labels: {}
  annotations: {}
  interval: ""
  scrapeTimeout: ""
  metricRelabelings: []
  relabelings: []
secret:
  servicePassword: ""
serviceAccount:
  annotations: {}
  automount: true
  create: true
  name: ""

global:
  commonLabels: {}

prometheusRules:
  create: true
  ruleSelectors: {}
  labels: {}
  annotations: {}
  additionalRuleLabels: {}
  # Disable individual alerts by name:
  # disabled:
  #   HypervisorOnboardingStuck: true
  #   HypervisorEvictedTooLong: true
  #   EvictionFailed: true
  #   EvictionMigrationFailing: true
  #   EvictionOutstandingRamHigh: true
  disabled: {}

dashboards:
  create: true
  global:
    create: false
    dashboardSelectors: []
  dashboardSelectors:
    - name: perses.dev/resource
      value: '"true"'

customResourceMetrics:
  create: true
  # Disable individual custom resource metrics ConfigMaps by name:
  # disabled:
  #   hypervisor: true
  #   eviction: true
  disabled: {}
